  <script>
const trackingParams = [
  'gclid', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_matchtype'
];
// --- 1. Sauvegarde à l'arrivée ---
(function () {
  const urlParams = new URLSearchParams(window.location.search);
  trackingParams.forEach(p => {
    const val = urlParams.get(p);
    if (val) localStorage.setItem(p, val);
  });
})();
// --- 2. Réinjection dans les liens ---
function reinjectTracking() {
  const links = document.querySelectorAll('a[href]');
  links.forEach(link => {
    const url = new URL(link.href, window.location.origin);
    trackingParams.forEach(p => {
      const val = localStorage.getItem(p);
      if (val && !url.searchParams.get(p)) url.searchParams.set(p, val);
    });
    link.href = url.toString();
  });
}
// --- 3. Réinjection Tally via config ---
window.TallyConfig = {
  hiddenFields: Object.fromEntries(
    trackingParams.map(p => [p, localStorage.getItem(p)])
  )
};
document.addEventListener('DOMContentLoaded', reinjectTracking);
</script>
